name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke-tests:
    name: scripts/test-template.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq (test dependency)
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq jq
          fi

      - name: Configure git for tests
        run: |
          # Some smoke tests (pipeline shell-phase, real loop runs) need git commits
          # to succeed in temp repos. Set a global identity so init_git_repo's
          # `git commit -m init` doesn't fail when GitHub Actions hasn't seeded one.
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"

      - name: Run smoke tests
        run: ./scripts/test-template.sh
